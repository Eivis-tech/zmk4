# =========================
# SPLIT CONFIGURATION
# =========================
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=y

# =========================
# BLUETOOTH
# =========================
CONFIG_ZMK_BLE=y
CONFIG_ZMK_BLE_CENTRAL=y
CONFIG_ZMK_BLE_PERIPHERAL=y
CONFIG_BT_MAX_CONN=5
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# =========================
# ZMK STUDIO
# =========================
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# =========================
# USB
# =========================
CONFIG_ZMK_USB=y
