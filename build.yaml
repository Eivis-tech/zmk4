# Build matrix for ZMK firmware

include:
  # LEFT side su ZMK Studio support
  - board: nice_nano_v2
    shield: corne_left
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y
    artifact-name: corne_left_with_studio

  # RIGHT side (be Studio)
  - board: nice_nano_v2
    shield: corne_right
    artifact-name: corne_right

  # Settings reset firmware
  - board: nice_nano_v2
    shield: settings_reset
    artifact-name: settings_reset
