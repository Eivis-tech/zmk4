include:
  # LEFT — BLE central + ZMK Studio
  - board: nice_nano_v2
    shield: zmk2_left
    snippet: bluetooth studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_BLE=y -DCONFIG_ZMK_STUDIO=y
    artifact-name: zmk2_left_with_ble

  # RIGHT — BLE peripheral
  - board: nice_nano_v2
    shield: zmk2_right
    snippet: bluetooth
    cmake-args: -DCONFIG_ZMK_BLE=y
    artifact-name: zmk2_right_with_ble

  # Settings reset (to clear old pairing)
  - board: nice_nano_v2
    shield: settings_reset
