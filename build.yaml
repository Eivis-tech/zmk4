# ZMK firmware build matrix
include:
  # LEFT — Central + BLE + ZMK Studio
  - board: nice_nano_v2
    shield: zmk2_left
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y
    artifact-name: zmk2_left_with_studio

  # RIGHT — Peripheral (split BLE only)
  - board: nice_nano_v2
    shield: zmk2_right
    artifact-name: zmk2_right

  # Reset firmware (naudoti prieš pirmą pairing)
  - board: nice_nano_v2
    shield: settings_reset
    artifact-name: settings_reset
